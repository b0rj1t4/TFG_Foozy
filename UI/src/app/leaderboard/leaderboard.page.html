<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Leaderboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="danger">
  <div class="leaderboard-container">
    <!-- Top 3 Podium -->
    <div class="podium">
      <!-- 2nd Place -->
      <div class="podium-player second">
        <ion-avatar class="podium-avatar">
          <div class="avatar-placeholder"></div>
        </ion-avatar>
        <div class="player-info">
          <p class="player-name">{{ topThree[1]?.name }}</p>
          <p class="player-points">{{ topThree[1]?.points }} pts</p>
        </div>
      </div>

      <!-- 1st Place -->
      <div class="podium-player first">
        <div class="crown">👑</div>
        <ion-avatar class="podium-avatar">
          <div class="avatar-placeholder"></div>
        </ion-avatar>
        <div class="rank-badge">1</div>
        <div class="player-info">
          <p class="player-name">{{ topThree[0]?.name }}</p>
          <p class="player-points">{{ topThree[0]?.points }} pts</p>
        </div>
      </div>

      <!-- 3rd Place -->
      <div class="podium-player third">
        <ion-avatar class="podium-avatar">
          <div class="avatar-placeholder"></div>
        </ion-avatar>
        <div class="rank-badge">3</div>
        <div class="player-info">
          <p class="player-name">{{ topThree[2]?.name }}</p>
          <p class="player-points">{{ topThree[2]?.points }} pts</p>
        </div>
      </div>
    </div>

    <!-- Remaining Players List -->
    <ion-list class="players-list">
      <ion-item
        *ngFor="let player of remainingPlayers"
        lines="none"
        class="player-item"
      >
        <div class="rank-number">{{ player.rank }}</div>
        <ion-avatar slot="start">
          <div class="avatar-placeholder"></div>
        </ion-avatar>
        <ion-label>
          <h2>{{ player.name }}</h2>
        </ion-label>
        <div class="points-badge" slot="end">{{ player.points }} pts</div>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
